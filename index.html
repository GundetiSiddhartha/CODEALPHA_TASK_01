<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header id="main-nav" class="hidden">
        <div class="nav-container">
            <h1 onclick="showPage('store-page')" style="cursor:pointer; color:#2563eb;">SwiftShop</h1>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search items...">
                <button onclick="handleSearch()">Search</button>
            </div>
            <nav>
                <button onclick="showPage('store-page')">Shop</button>
                <button onclick="showPage('cart-page')">Cart (<span id="cart-count">0</span>)</button>
                <button onclick="showPage('account-page')">Account</button>
                <button onclick="handleLogout()" style="color:#ef4444;">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="auth-page" class="view">
            <div class="auth-box">
                <div class="tabs">
                    <button id="tab-login" class="active" onclick="toggleAuth('login')">Login</button>
                    <button id="tab-signup" onclick="toggleAuth('signup')">Sign Up</button>
                </div>
                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div id="username-group" class="form-group hidden">
                        <label>Username</label>
                        <input type="text" id="auth-username" placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="auth-email" required placeholder="user@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="auth-password" required placeholder="••••">
                    </div>
                    <button type="submit" id="auth-btn" class="btn-main">Login</button>
                </form>
            </div>
        </section>

        <section id="store-page" class="view hidden">
            <h2>Our Products</h2>
            <div id="product-grid" class="grid"></div>
        </section>

        <section id="details-page" class="view hidden">
            <button class="btn-sub" onclick="showPage('store-page')">← Back to Shop</button>
            <div id="details-content" class="details-box"></div>
        </section>

        <section id="cart-page" class="view hidden">
            <h2>Your Cart</h2>
            <div class="split-layout">
                <div id="cart-items" class="main-panel"></div>
                <div id="cart-summary" class="side-panel hidden">
                    <h3>Summary</h3>
                    <p>Total: <strong id="cart-total">$0.00</strong></p>
                    <button class="btn-main" onclick="showPage('checkout-page')">Proceed to Order</button>
                </div>
            </div>
        </section>

        <section id="checkout-page" class="view hidden">
            <h2>Process Your Order</h2>
            <form onsubmit="processOrder(event)" class="auth-box" style="margin:0; max-width:100%;">
                <div class="form-group">
                    <label>Shipping Address</label>
                    <input type="text" id="checkout-address" required placeholder="123 Main St">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="checkout-phone" required placeholder="555-555-5555">
                </div>
                <button type="submit" class="btn-main" style="background:#10b981;">Place Order</button>
            </form>
        </section>

        <section id="account-page" class="view hidden">
            <h2>Your Profile Account</h2>
            <div class="split-layout">
                <div class="main-panel">
                    <h3>Profile Details</h3>
                    <form onsubmit="updateProfile(event)">
                        <div class="form-group"><label>Username</label><input type="text" id="prof-name" required></div>
                        <div class="form-group"><label>Email</label><input type="email" id="prof-email" readonly style="background:#eee;"></div>
                        <div class="form-group"><label>Address</label><input type="text" id="prof-address"></div>
                        <div class="form-group"><label>Phone</label><input type="text" id="prof-phone"></div>
                        <button type="submit" class="btn-sub">Save Changes</button>
                    </form>
                </div>
                <div class="side-panel">
                    <h3>Order History</h3>
                    <div id="order-history"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
